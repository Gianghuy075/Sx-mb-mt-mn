services:
  # Next.js Application
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lottery-nextjs
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    volumes:
      # Persistent volume for uploaded files
      - uploads-data:/app/public/uploads
    restart: always
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: lottery-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/ssl
    command: >
      /bin/sh -c "
        if [ ! -f /etc/nginx/ssl/fullchain.pem ] || [ ! -f /etc/nginx/ssl/privkey.pem ]; then
          echo 'Generating self-signed origin certificate (replace with Cloudflare Origin cert for production)';
          mkdir -p /etc/nginx/ssl;
          openssl req -x509 -nodes -days 3650 \
            -subj '/CN=localhost' \
            -newkey rsa:2048 \
            -keyout /etc/nginx/ssl/privkey.pem \
            -out /etc/nginx/ssl/fullchain.pem;
        fi;
        nginx -g 'daemon off;'
      "
    depends_on:
      - nextjs
    restart: always
    networks:
      - app-network

volumes:
  # Persistent storage for uploaded images
  uploads-data:
    driver: local

networks:
  app-network:
    driver: bridge

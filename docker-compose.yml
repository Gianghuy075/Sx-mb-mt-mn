services:
  # Next.js Application
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lottery-nextjs
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    volumes:
      # Persistent volume for uploaded files
      - uploads-data:/app/public/uploads
    restart: always
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: lottery-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - nextjs
    restart: always
    networks:
      - app-network

volumes:
  # Persistent storage for uploaded images
  uploads-data:
    driver: local

networks:
  app-network:
    driver: bridge

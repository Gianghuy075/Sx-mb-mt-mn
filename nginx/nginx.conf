events {
    worker_connections 1024;
}

http {
    # Basic settings
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # SSL settings (used by HTTPS server block)
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # MIME types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logging
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript
               application/json application/javascript application/xml+rss
               application/rss+xml font/truetype font/opentype
               application/vnd.ms-fontobject image/svg+xml;

    # Upstream Next.js server
    upstream nextjs {
        server nextjs:3000;
    }

    # HTTP server (kept for Cloudflare Flexible or local access)
    server {
        listen 80;
        server_name _;

        # Increase upload size limit (5MB for images + buffer)
        client_max_body_size 10M;

        # Proxy settings
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Next.js application
        location / {
            proxy_pass http://nextjs;
        }

        # Static files caching (optional optimization)
        location /_next/static {
            proxy_pass http://nextjs;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Uploaded images caching
        location /uploads {
            proxy_pass http://nextjs;
            add_header Cache-Control "public, max-age=86400";
        }
    }

    # HTTPS server (for Cloudflare Full/Strict or direct TLS)
    server {
        listen 443 ssl http2;
        server_name _;

        # Certificates live in /etc/nginx/ssl (mounted from host or baked into image)
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Increase upload size limit (5MB for images + buffer)
        client_max_body_size 10M;

        # Proxy settings
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Next.js application
        location / {
            proxy_pass http://nextjs;
        }

        # Static files caching (optional optimization)
        location /_next/static {
            proxy_pass http://nextjs;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }

        # Uploaded images caching
        location /uploads {
            proxy_pass http://nextjs;
            add_header Cache-Control "public, max-age=86400";
        }
    }
}
